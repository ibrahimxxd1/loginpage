<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACCESS TERMINAL</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #00ff41;
      --green-dim: #00c032;
      --green-dark: #003b00;
      --green-glow: rgba(0, 255, 65, 0.25);
      --bg: #000000;
      --panel: rgba(0, 18, 0, 0.85);
      --border: rgba(0, 255, 65, 0.2);
      --font-mono: 'Share Tech Mono', monospace;
      --font-display: 'Orbitron', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font-mono);
    }

    /* ── MATRIX CANVAS BG ── */
    #matrix-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.55;
    }

    /* ── SCANLINES OVERLAY ── */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
    }

    /* ── WRAPPER ── */
    .wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── HEADER ── */
    .terminal-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .terminal-header .sys-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .terminal-header h1 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 900;
      color: var(--green);
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 0 20px var(--green), 0 0 40px var(--green-glow);
      animation: flicker 4s infinite;
    }
    .terminal-header .subtitle {
      font-family: var(--font-mono);
      font-size: 12px;
      color: rgba(0,255,65,0.5);
      letter-spacing: 2px;
      margin-top: 6px;
    }
    .cursor {
      display: inline-block;
      width: 10px; height: 14px;
      background: var(--green);
      vertical-align: middle;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
    }

    /* ── PANEL ── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 0 40px rgba(0,255,65,0.1), inset 0 0 60px rgba(0,20,0,0.5);
      overflow: hidden;
    }

    /* Panel title bar */
    .panel-bar {
      background: rgba(0,255,65,0.06);
      border-bottom: 1px solid var(--border);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-bar-title {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 2px;
    }
    .panel-dots { display: flex; gap: 6px; }
    .panel-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(0,255,65,0.15);
      border: 1px solid rgba(0,255,65,0.3);
    }
    .panel-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }

    /* Panel body */
    .panel-body { padding: 28px 32px 24px; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 24px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: span 2; }

    .form-group label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(0,255,65,0.55);
    }
    .form-group label::before { content: '> '; color: var(--green); }

    .form-group input {
      background: rgba(0,255,65,0.04);
      border: 1px solid rgba(0,255,65,0.2);
      border-radius: 3px;
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      caret-color: var(--green);
    }
    .form-group input::placeholder { color: rgba(0,255,65,0.2); font-size: 12px; }
    .form-group input:focus {
      border-color: var(--green);
      background: rgba(0,255,65,0.07);
      box-shadow: 0 0 12px rgba(0,255,65,0.15), inset 0 0 8px rgba(0,255,65,0.05);
    }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0 16px;
      font-family: var(--font-mono); font-size: 10px;
      color: rgba(0,255,65,0.3); letter-spacing: 3px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: rgba(0,255,65,0.15);
    }

    /* Submit */
    .submit-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      gap: 16px;
    }
    .submit-info {
      font-size: 11px;
      color: rgba(0,255,65,0.3);
      letter-spacing: 1px;
      line-height: 1.6;
    }
    .btn-submit {
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 13px 36px;
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.3s, box-shadow 0.3s;
      white-space: nowrap;
    }
    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--green);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
      z-index: -1;
    }
    .btn-submit:hover { color: #000; box-shadow: 0 0 24px var(--green-glow); }
    .btn-submit:hover::before { transform: scaleX(1); }

    /* Footer note */
    .panel-foot {
      border-top: 1px solid var(--border);
      padding: 12px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-foot span {
      font-size: 10px;
      color: rgba(0,255,65,0.3);
      letter-spacing: 1.5px;
    }
    .panel-foot a {
      color: var(--green-dim);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-decoration: none;
      transition: color 0.2s;
    }
    .panel-foot a:hover { color: var(--green); text-shadow: 0 0 8px var(--green); }

    /* ── ANIMATIONS ── */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes flicker {
      0%,98%,100%{opacity:1}
      99%{opacity:0.6}
    }
    @keyframes fadeDown {
      from{opacity:0;transform:translateY(-16px)}
      to{opacity:1;transform:translateY(0)}
    }
    .terminal-header { animation: fadeDown 0.6s ease both; }
    .panel { animation: fadeDown 0.6s 0.15s ease both; }

    /* ========== MEDIA QUERIES ========== */

    /* Small phones (up to 480px) */
    @media screen and (max-width: 480px) {
      .wrapper {
        padding: 10px;
        justify-content: flex-start;
        padding-top: 20px;
        height: auto;
        min-height: 100vh;
        overflow-y: auto;
      }

      html, body {
        overflow-y: auto;
      }

      .terminal-header {
        margin-bottom: 16px;
      }

      .terminal-header .sys-label {
        font-size: 8px;
        letter-spacing: 2px;
      }

      .terminal-header h1 {
        font-size: 18px;
        letter-spacing: 3px;
        line-height: 1.3;
      }

      .terminal-header .subtitle {
        font-size: 9px;
        letter-spacing: 1px;
      }

      .panel {
        max-width: 100%;
      }

      .panel-body {
        padding: 16px 12px;
      }

      .form-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .form-group.full {
        grid-column: span 1;
      }

      .form-group input {
        font-size: 14px;
        padding: 12px 10px;
      }

      .divider {
        margin: 16px 0 12px;
        font-size: 9px;
      }

      .submit-row {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }

      .submit-info {
        text-align: center;
        font-size: 10px;
      }

      .btn-submit {
        width: 100%;
        padding: 14px 20px;
        font-size: 12px;
      }

      .panel-foot {
        padding: 12px 16px;
        flex-direction: column;
        gap: 8px;
        text-align: center;
      }

      .panel-foot span, .panel-foot a {
        font-size: 9px;
      }

      .cursor {
        width: 8px;
        height: 12px;
      }
    }

    /* Medium phones (481px to 767px) */
    @media screen and (min-width: 481px) and (max-width: 767px) {
      .wrapper {
        padding: 15px;
        height: auto;
        min-height: 100vh;
        overflow-y: auto;
        justify-content: flex-start;
        padding-top: 30px;
      }

      html, body {
        overflow-y: auto;
      }

      .terminal-header h1 {
        font-size: 22px;
        letter-spacing: 4px;
      }

      .terminal-header .subtitle {
        font-size: 10px;
      }

      .panel-body {
        padding: 20px 18px;
      }

      .form-grid {
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .form-group input {
        font-size: 13px;
        padding: 10px 12px;
      }

      .btn-submit {
        padding: 12px 28px;
      }

      .panel-foot {
        padding: 12px 20px;
      }
    }

    /* Tablets (768px to 1023px) */
    @media screen and (min-width: 768px) and (max-width: 1023px) {
      .wrapper {
        padding: 25px;
      }

      .terminal-header h1 {
        font-size: 26px;
      }

      .panel {
        max-width: 600px;
      }

      .panel-body {
        padding: 24px 28px;
      }

      .form-grid {
        gap: 16px 20px;
      }

      .form-group input {
        font-size: 13px;
        padding: 10px 12px;
      }

      .btn-submit {
        padding: 12px 32px;
      }

      .panel-foot {
        padding: 12px 28px;
      }
    }

    /* Laptops / Small Desktops (1024px to 1365px) */
    @media screen and (min-width: 1024px) and (max-width: 1365px) {
      .panel {
        max-width: 640px;
      }

      .panel-body {
        padding: 26px 30px;
      }

      .form-group input {
        font-size: 13px;
        padding: 10px 13px;
      }
    }

    /* Large Desktops (1366px and above) */
    @media screen and (min-width: 1366px) {
      .panel {
        max-width: 720px;
      }

      .terminal-header h1 {
        font-size: 32px;
      }

      .panel-body {
        padding: 32px 36px;
      }

      .form-group input {
        font-size: 14px;
        padding: 12px 16px;
      }
    }

    /* Landscape mode for phones */
    @media screen and (max-height: 500px) and (orientation: landscape) {
      .wrapper {
        padding: 10px;
        height: auto;
        min-height: 100vh;
        overflow-y: auto;
        justify-content: flex-start;
      }

      html, body {
        overflow-y: auto;
      }

      .terminal-header {
        margin-bottom: 12px;
      }

      .terminal-header h1 {
        font-size: 18px;
      }

      .terminal-header .subtitle {
        font-size: 9px;
      }

      .panel-body {
        padding: 12px 16px;
      }

      .form-grid {
        grid-template-columns: 1fr 1fr;
        gap: 8px 12px;
      }

      .form-group input {
        padding: 8px 10px;
        font-size: 12px;
      }

      .submit-row {
        margin-top: 12px;
      }

      .btn-submit {
        padding: 8px 24px;
      }
    }

    /* High-resolution screens */
    @media screen and (min-width: 1920px) {
      .panel {
        max-width: 800px;
      }

      .terminal-header h1 {
        font-size: 36px;
      }

      .terminal-header .subtitle {
        font-size: 14px;
      }

      .panel-body {
        padding: 36px 40px;
      }

      .form-group label {
        font-size: 11px;
      }

      .form-group input {
        font-size: 15px;
        padding: 14px 18px;
      }

      .btn-submit {
        font-size: 14px;
        padding: 15px 40px;
      }

      .panel-foot span, .panel-foot a {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

  <canvas id="matrix-canvas"></canvas>
  <div class="scanlines"></div>

  <div class="wrapper">
    <div class="terminal-header">
      <div class="sys-label">// SYSTEM ACCESS PORTAL v2.4.1</div>
      <h1>ACCESS TERMINAL<span class="cursor"></span></h1>
      <div class="subtitle">INITIALIZE USER REGISTRATION SEQUENCE</div>
    </div>

    <div class="panel">
      <div class="panel-bar">
        <span class="panel-bar-title">register.exe — RUNNING</span>
        <div class="panel-dots">
          <div class="panel-dot"></div>
          <div class="panel-dot active"></div>
          <div class="panel-dot active"></div>
        </div>
      </div>

      <div class="panel-body">
        <form autocomplete="off">
          <div class="form-grid">
            <div class="form-group">
              <label for="fname">First Name</label>
              <input type="text" id="fname" placeholder="Enter first name">
            </div>
            <div class="form-group">
              <label for="lname">Last Name</label>
              <input type="text" id="lname" placeholder="Enter last name">
            </div>
            <div class="form-group">
              <label for="username">Username</label>
              <input type="text" id="username" placeholder="Choose a username">
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="your@email.com">
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" placeholder="••••••••••••">
            </div>
            <div class="form-group">
              <label for="hobby">Hobby</label>
              <input type="text" id="hobby" placeholder="What do you enjoy?">
            </div>

            <div class="divider full">LOCATION DATA</div>

            <div class="form-group full">
              <label for="address">Address</label>
              <input type="text" id="address" placeholder="Street address">
            </div>
            <div class="form-group">
              <label for="city">City</label>
              <input type="text" id="city" placeholder="City">
            </div>
            <div class="form-group">
              <label for="zip">ZIP Code</label>
              <input type="text" id="zip" placeholder="00000">
            </div>
          </div>

          <div class="submit-row">
            <div class="submit-info">
              ENCRYPTED TRANSMISSION<br>
              ALL FIELDS REQUIRED
            </div>
            <button type="submit" class="btn-submit">SUBMIT →</button>
          </div>
        </form>
      </div>

      <div class="panel-foot">
        <span>SECURE CONNECTION ESTABLISHED</span>
        <a href="#">ALREADY HAVE ACCESS? SIGN IN</a>
      </div>
    </div>
  </div>

  <script>
    // ── MATRIX RAIN ──
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ01';
    const fontSize = 14;
    let cols = Math.floor(canvas.width / fontSize);
    let drops = Array(cols).fill(1);

    function drawMatrix() {
      cols = Math.floor(canvas.width / fontSize);
      while (drops.length < cols) drops.push(Math.random() * -canvas.height / fontSize);
      ctx.fillStyle = 'rgba(0,0,0,0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = fontSize + 'px Share Tech Mono';
      for (let i = 0; i < drops.length; i++) {
        const char = chars[Math.floor(Math.random() * chars.length)];
        const bright = Math.random() > 0.95;
        ctx.fillStyle = bright ? '#ffffff' : '#00ff41';
        ctx.globalAlpha = bright ? 0.9 : 0.45 + Math.random() * 0.4;
        ctx.fillText(char, i * fontSize, drops[i] * fontSize);
        ctx.globalAlpha = 1;
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }

    setInterval(drawMatrix, 40);
  </script>
</body>
</html>
